services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: legalcase-prod
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d legalcase-prod"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend/legalcase
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/legalcase-prod
      DB_USERNAME: admin
      DB_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/legalcase
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  pgdata: